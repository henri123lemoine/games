# Workspace CI: format, lint, test, and the wasm/web typecheck.
# azt/ is deliberately not covered — it is a standalone crate that needs
# libtorch (and trains on Apple-GPU), so it builds only on dev machines.
name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --release --all-targets -- -D warnings
      - run: cargo test --release

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - run: wasm-pack build web/engine --target web --out-dir pkg
      - run: node web/engine/smoke.mjs
      - run: npm ci
        working-directory: web/app
      - run: npm run build
        working-directory: web/app
      - run: rm -rf web/app/dist/azero # wasm test fixtures, not part of the site
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: arcade-dist
          path: web/app/dist

  # Publishes the built arcade to the `arcade-dist` branch. The (private)
  # personal-website repo mounts that branch at henrilemoine.com/arcade/
  # on its own deploys — every site push plus a daily freshness cron —
  # tokenlessly, since this repo is public.
  deploy-arcade:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [rust, web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: arcade-dist
          path: arcade-dist
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./arcade-dist
          publish_branch: arcade-dist
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
