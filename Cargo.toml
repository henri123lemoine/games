[package]
name = "twentyone"
version = "0.1.0"
edition = "2021"

[dependencies]
thiserror = "2.0.14"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
criterion = "0.7"

[lib]
name = "twentyone"
path = "src/lib.rs"

[[bin]]
name = "twentyone_bridge"
path = "src/bin/bridge.rs"

[[bench]]
name = "sim_bench"
harness = false
